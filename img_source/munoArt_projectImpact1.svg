<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 562 315" width="562" height="315">
  <!-- Title -->
  <text x="281" y="28" font-family="'Inter','Noto Sans',sans-serif" font-size="13" font-weight="700" fill="#888888" text-anchor="middle" letter-spacing="2">BUILD — MEASURE — LEARN</text>

  <!-- Circular process: 3 nodes connected by arrows -->
  <!-- BUILD node (top) -->
  <circle cx="281" cy="80" r="52" fill="#111111"/>
  <text x="281" y="84" font-family="'Inter',sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">BUILD</text>

  <!-- MEASURE node (bottom-right) -->
  <circle cx="363" cy="222" r="52" fill="#37A3E2"/>
  <text x="363" y="226" font-family="'Inter',sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">MEASURE</text>

  <!-- LEARN node (bottom-left) -->
  <circle cx="199" cy="222" r="52" fill="#555555"/>
  <text x="199" y="226" font-family="'Inter',sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">LEARN</text>

  <!-- Arrow: BUILD → MEASURE (curved) -->
  <path d="M325,100 Q380,140 375,170" fill="none" stroke="#CCCCCC" stroke-width="2" marker-end="url(#arrowGray)"/>
  <!-- Arrow: MEASURE → LEARN -->
  <path d="M315,240 Q281,260 245,240" fill="none" stroke="#CCCCCC" stroke-width="2" marker-end="url(#arrowGray)"/>
  <!-- Arrow: LEARN → BUILD -->
  <path d="M187,170 Q178,140 237,100" fill="none" stroke="#CCCCCC" stroke-width="2" marker-end="url(#arrowGray)"/>

  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#CCCCCC"/>
    </marker>
  </defs>

  <!-- Center icon: recycle/loop symbol -->
  <text x="281" y="180" font-family="'Inter',sans-serif" font-size="24" fill="#DDDDDD" text-anchor="middle">&#x21BB;</text>
</svg>
