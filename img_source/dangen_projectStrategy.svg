    <text x="50" y="38" font-family="'Inter',sans-serif" font-size="16" font-weight="700" fill="#EF677F" text-anchor="middle">3</text>
  </g>
  <g transform="translate(670, 185)">
    <circle cx="50" cy="35" r="28" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
    <circle cx="50" cy="28" r="10" fill="#EF677F" opacity="0.3"/>
    <path d="M30,50 Q50,65 70,50" fill="none" stroke="#EF677F" stroke-width="1.5" opacity="0.3"/>
    <text x="50" y="38" font-family="'Inter',sans-serif" font-size="16" font-weight="700" fill="#EF677F" text-anchor="middle">4</text>
  </g>

  <!-- Row 2 (3 participants) -->
  <g transform="translate(195, 265)">
    <circle cx="50" cy="35" r="28" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
    <circle cx="50" cy="28" r="10" fill="#EF677F" opacity="0.3"/>
    <path d="M30,50 Q50,65 70,50" fill="none" stroke="#EF677F" stroke-width="1.5" opacity="0.3"/>
