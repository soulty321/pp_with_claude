<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 990 432" width="990" height="432">
  <rect width="990" height="432" fill="#C4C4C4" fill-opacity="0.1" rx="16"/>

  <!-- Title -->
  <text x="495" y="36" font-family="'Inter','Noto Sans',sans-serif" font-size="14" font-weight="700" fill="#888888" text-anchor="middle" letter-spacing="2">DESIGN THINKING RESEARCH FLOW</text>

  <!-- 3 Phase Flow: Empathize → Define → Ideation -->
  <!-- Phase 1: Empathize -->
  <rect x="40" y="60" width="280" height="50" rx="12" fill="#EF677F"/>
  <text x="180" y="91" font-family="'Inter',sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">01  EMPATHIZE</text>

  <!-- Arrow 1 -->
  <polygon points="340,85 355,75 355,95" fill="#DDDDDD"/>

  <!-- Phase 2: Define -->
  <rect x="370" y="60" width="250" height="50" rx="12" fill="#222222"/>
  <text x="495" y="91" font-family="'Inter',sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">02  DEFINE</text>

  <!-- Arrow 2 -->
  <polygon points="640,85 655,75 655,95" fill="#DDDDDD"/>

  <!-- Phase 3: Ideation -->
  <rect x="670" y="60" width="280" height="50" rx="12" fill="#37A3E2"/>
  <text x="810" y="91" font-family="'Inter',sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">03  IDEATION</text>

  <!-- Interview Participants Section -->
  <text x="495" y="155" font-family="'Inter',sans-serif" font-size="13" font-weight="700" fill="#555555" text-anchor="middle" letter-spacing="1">DEPTH INTERVIEW — 7 PARTICIPANTS</text>
  <line x1="150" y1="165" x2="840" y2="165" stroke="#EEEEEE" stroke-width="1"/>

  <!-- Participant icons - Row 1 (4 participants) -->
