    <circle cx="50" cy="28" r="10" fill="#EF677F" opacity="0.3"/>
    <path d="M30,50 Q50,65 70,50" fill="none" stroke="#EF677F" stroke-width="1.5" opacity="0.3"/>
    <text x="50" y="38" font-family="'Inter',sans-serif" font-size="16" font-weight="700" fill="#EF677F" text-anchor="middle">2</text>
