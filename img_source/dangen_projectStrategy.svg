    <path d="M30,50 Q50,65 70,50" fill="none" stroke="#EF677F" stroke-width="1.5" opacity="0.3"/>
    <text x="50" y="38" font-family="'Inter',sans-serif" font-size="16" font-weight="700" fill="#EF677F" text-anchor="middle">1</text>
  </g>
  <g transform="translate(290, 185)">
