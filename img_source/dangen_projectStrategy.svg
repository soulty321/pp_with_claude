  <!-- Aha Moment threshold marker -->
  <rect x="180" y="370" width="630" height="46" rx="14" fill="#EF677F" opacity="0.1"/>
  <line x1="495" y1="365" x2="495" y2="375" stroke="#EF677F" stroke-width="2"/>
  <!-- Threshold icon -->
  <circle cx="340" cy="393" r="14" fill="#EF677F"/>
  <text x="340" y="398" font-family="'Inter',sans-serif" font-size="14" font-weight="800" fill="white" text-anchor="middle">3</text>
  <text x="370" y="390" font-family="'Inter',sans-serif" font-size="11" font-weight="600" fill="#EF677F">= Aha Moment Threshold</text>
  <text x="370" y="406" font-family="'Inter',sans-serif" font-size="10" fill="#999999">Retention Key Point</text>
