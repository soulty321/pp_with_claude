name: Discord Daily Report Notification

on:
  push:
    branches:
      - main
    paths:
      - 'daily_reports/**/*.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed report files
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'daily_reports/**/*.md' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Send to Discord
        if: steps.changed.outputs.files != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          for FILE in ${{ steps.changed.outputs.files }}; do
            if [ ! -f "$FILE" ]; then continue; fi

            CATEGORY=$(echo "$FILE" | cut -d'/' -f2)
            DATE=$(basename "$FILE" .md)
            CONTENT=$(python scripts/md_to_discord.py "$FILE")

            # Discord 2000자 제한 처리 — 초과 시 분할 전송
            MAX=1900
            TITLE="📋 Daily Report | $CATEGORY | $DATE"

            # 청크 분할 전송
            TOTAL=${#CONTENT}
            START=0
            CHUNK_NUM=1
            CHUNKS=$(( (TOTAL + MAX - 1) / MAX ))

            while [ $START -lt $TOTAL ]; do
              CHUNK="${CONTENT:$START:$MAX}"
              START=$((START + MAX))

              if [ $CHUNKS -gt 1 ]; then
                PART_TITLE="$TITLE (${CHUNK_NUM}/${CHUNKS})"
              else
                PART_TITLE="$TITLE"
              fi

              PAYLOAD=$(jq -n \
                --arg title "$PART_TITLE" \
                --arg desc "$CHUNK" \
                '{
                  embeds: [{
                    title: $title,
                    description: $desc,
                    color: 5814783
                  }]
                }')

              curl -s -X POST "$DISCORD_WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD"

              CHUNK_NUM=$((CHUNK_NUM + 1))
              sleep 1
            done
          done

      - name: Sync jobs to Notion
        if: steps.changed.outputs.files != ''
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_JOBS_DB_ID: ${{ secrets.NOTION_JOBS_DB_ID }}
          NOTION_LOG_DB_ID: ${{ secrets.NOTION_LOG_DB_ID }}
        run: |
          if [ -z "$NOTION_TOKEN" ] || [ -z "$NOTION_JOBS_DB_ID" ]; then
            echo "Notion secrets not configured — skipping sync"
            exit 0
          fi
          pip install -q notion-client
          for FILE in ${{ steps.changed.outputs.files }}; do
            if [[ "$FILE" == *"/jobs/"* ]] && [ -f "$FILE" ]; then
              python scripts/notion_sync.py "$FILE"
            fi
          done
